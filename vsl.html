  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #2563EB;
      --accent-hover: #1d4ed8;
      --accent-muted: rgba(37, 99, 235, 0.12);
      --bg: #0A0A0A;
      --card: #111111;
      --elevated: #1A1A1A;
      --text-primary: #F8F8F8;
      --text-secondary: #A0A0A0;
      --text-muted: #606060;
      --border: rgba(255, 255, 255, 0.08);
      --radius-card: 12px;
      --radius-btn: 8px;
      --radius-pill: 9999px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fade-in {
      animation: fadeInUp 0.7s ease forwards;
    }

    .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; }
    .fade-in-delay-2 { animation-delay: 0.25s; opacity: 0; }
    .fade-in-delay-3 { animation-delay: 0.4s; opacity: 0; }
    .fade-in-delay-4 { animation-delay: 0.55s; opacity: 0; }

    /* LAYOUT */
    .container {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .container--wide {
      max-width: 1060px;
    }

    section {
      padding: 80px 0;
    }

    /* HEADER / LOGO */
    .header {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .header__inner {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      height: 36px;
      width: auto;
    }

    .logo-fallback {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .logo-fallback span {
      color: var(--accent);
    }

    /* HERO */
    .hero {
      padding: 100px 0 60px;
      text-align: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-muted);
      color: var(--accent);
      border: 1px solid rgba(37, 99, 235, 0.25);
      border-radius: var(--radius-pill);
      padding: 6px 16px;
      font-size: clamp(0.72rem, 2vw, 0.82rem);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .pill__dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }

    .hero__headline {
      font-size: clamp(2rem, 5.5vw, 3.4rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 24px;
      max-width: 780px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero__headline .highlight {
      color: var(--accent);
    }

    .hero__sub {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-secondary);
      max-width: 580px;
      margin: 0 auto 40px;
      font-weight: 400;
      line-height: 1.7;
    }

    /* STATS ROW */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .stat {
      text-align: center;
    }

    .stat__value {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .stat__label {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 400;
    }

    .stat__divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* VIDEO */
    .video-section {
      padding: 0 0 80px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-label {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* SECTION LABELS */
    .section-label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      line-height: 1.2;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .section-body {
      font-size: clamp(0.95rem, 2.2vw, 1.08rem);
      color: var(--text-secondary);
      line-height: 1.75;
    }

    /* PROBLEM SECTION */
    .problem-section {
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .problem-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 48px;
    }

    .problem-card {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 28px 24px;
      transition: border-color 0.2s ease;
    }

    .problem-card:hover {
      border-color: rgba(255, 255, 255, 0.15);
    }

    .problem-card__icon {
      width: 40px;
      height: 40px;
      background: rgba(255, 80, 80, 0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: #ff6b6b;
    }

    .problem-card__title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .problem-card__text {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* AGITATION */
    .agitation-section {
      padding: 80px 0;
    }

    .agitation-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-card);
      padding: 40px 40px 40px 36px;
    }

    .quote-text {
      font-size: clamp(1.05rem, 2.5vw, 1.25rem);
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.7;
      font-style: italic;
    }

    /* MECHANISM */
    .mechanism-section {
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .mechanism-steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2px;
      margin-top: 48px;
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      overflow: hidden;
    }

    .step {
      background: var(--elevated);
      padding: 36px 28px;
      position: relative;
      transition: background 0.2s ease;
    }

    .step:hover {
      background: #202020;
    }

    .step__number {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .step__title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .step__text {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .mechanism-weapon {
      margin-top: 40px;
      background: var(--accent-muted);
      border: 1px solid rgba(37, 99, 235, 0.2);
      border-radius: var(--radius-card);
      padding: 32px;
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .weapon-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .weapon-content__label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .weapon-content__title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .weapon-content__text {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* PROOF / CASE STUDY */
    .proof-section {
      padding: 80px 0;
    }

    .case-study-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }

    .case-study-card .result-before,
    .case-study-card .result-after {
      text-align: center;
    }

    .result-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .result-value {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .result-value--before {
      color: var(--text-secondary);
    }

    .result-value--after {
      color: var(--accent);
    }

    .result-name {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .case-arrow {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .arrow-line {
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--text-muted), var(--accent));
      border-radius: 2px;
    }

    .arrow-text {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 600;
      text-align: center;
    }

    .case-study-footer {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      text-align: center;
    }

    .credential {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .credential__val {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .credential__label {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* OFFER */
    .offer-section {
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .offer-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-top: 48px;
      align-items: start;
    }

    .offer-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .offer-list li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .check-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      background: rgba(37, 99, 235, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .check-icon svg {
      width: 11px;
      height: 11px;
      color: var(--accent);
    }

    .offer-card {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      position: sticky;
      top: 24px;
    }

    .offer-card__label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .offer-card__price {
      font-size: clamp(2.2rem, 5vw, 3rem);
      font-weight: 900;
      color: var(--text-primary);
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .offer-card__price-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    .offer-card__divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .offer-card__feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* GUARANTEE */
    .guarantee-section {
      padding: 80px 0;
    }

    .guarantee-box {
      background: var(--card);
      border: 1px solid rgba(37, 99, 235, 0.3);
      border-radius: 16px;
      padding: 56px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .guarantee-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .guarantee-badge {
      width: 80px;
      height: 80px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      color: #fff;
    }

    .guarantee-badge svg {
      width: 36px;
      height: 36px;
    }

    .guarantee-title {
      font-size: clamp(1.5rem, 3.5vw, 2.1rem);
      font-weight: 800;
      letter-spacing: -0.025em;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .guarantee-text {
      font-size: clamp(0.95rem, 2.2vw, 1.08rem);
      color: var(--text-secondary);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.75;
    }

    /* CTA SECTION */
    .cta-section {
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 56px;
      padding: 0 32px;
      border-radius: var(--radius-btn);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 700;
